{% extends "base.html" %}
{% set page_title = "Sign in" %}

{% block content %}
<div class="site-wrapper">
  <div style="max-width: 420px; margin: 100px auto; text-align: center;">

    <div style="font-family: var(--font-mono); font-size: 2rem; color: var(--accent); margin-bottom: 8px;">🧪</div>
    <h1 style="font-size: 1.5rem; font-weight: 700; color: var(--text-bright); margin-bottom: 8px; letter-spacing: -0.3px;">
      frAInk Admin
    </h1>
    <p style="color: var(--text-dim); font-size: 0.9rem; margin-bottom: 40px;">
      Sign in with your Microsoft account to access the dashboard and frAInk chat.
    </p>

    {% if error %}
    <div style="background: rgba(248,81,73,0.1); border: 1px solid rgba(248,81,73,0.3); border-radius: 6px; padding: 14px 20px; margin-bottom: 24px; color: #f85149; font-size: 0.88rem;">
      {{ error }}
    </div>
    {% endif %}

    <a href="/login/microsoft" class="btn btn-primary" style="width: 100%; justify-content: center; padding: 14px 24px; font-size: 0.95rem;">
      Sign in with Microsoft
    </a>

    <p style="margin-top: 24px; font-size: 0.8rem; color: var(--text-dim);">
      frank@letmebefraink.com only.
    </p>

  </div>
</div>
{% endblock %}
